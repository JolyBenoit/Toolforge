[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "toolforge-core"
version = "0.1.0"
description = "LLMAgent base class, LLMClient abstraction, Creator and Consumer agent loops"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.25.0",
    "openai>=1.25.0",
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
production = [
    "toolforge-telemetry",
]

[tool.uv.sources]
toolforge-telemetry = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/toolforge_core"]
