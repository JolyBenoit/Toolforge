[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "toolforge-tui"
version = "0.1.0"
description = "Terminal user interface for Creator and Consumer agents"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.60.0",
    "toolforge-core",
    "toolforge-registry",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.uv.sources]
toolforge-core = { workspace = true }
toolforge-registry = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/toolforge_tui"]
