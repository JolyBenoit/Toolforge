[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "toolforge-cli"
version = "0.1.0"
description = "Single entry point CLI wiring all ToolForge packages"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1.0",
    "toolforge-core",
    "toolforge-registry",
    "toolforge-mcp-creator",
    "toolforge-mcp-usecase",
    "toolforge-sandbox",
    "toolforge-telemetry",
    "toolforge-tui",
]

[tool.uv.sources]
toolforge-core = { workspace = true }
toolforge-registry = { workspace = true }
toolforge-mcp-creator = { workspace = true }
toolforge-mcp-usecase = { workspace = true }
toolforge-sandbox = { workspace = true }
toolforge-telemetry = { workspace = true }
toolforge-tui = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
toolforge = "toolforge_cli.main:cli"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/toolforge_cli"]
