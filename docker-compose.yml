services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: toolforge
      POSTGRES_USER: toolforge
      POSTGRES_PASSWORD: toolforge
    ports:
      - "5432:5432"
    volumes:
      - toolforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  toolforge_pgdata:
